<style>
:root{
  --bg:#0f0e0b;--bg2:#181614;--gold:#c8b97a;--g3:rgba(200,185,122,.08);
  --b1:rgba(200,185,122,.16);--b2:rgba(200,185,122,.08);
  --tx:#e8e0d0;--t2:#9a8e78;--t3:#5a5448;--t4:#3a3428;
  --gn:#7ab87a;--gnb:rgba(74,124,89,.12);--gnl:rgba(74,124,89,.3);
  --rd:#b87a7a;--rdb:rgba(124,74,74,.12);--rdl:rgba(124,74,74,.3);
  --bl:#7a9ab8;--blb:rgba(74,92,124,.12);--bll:rgba(74,92,124,.3);
  --or:#b8967a;--orb:rgba(124,89,74,.12);--orl:rgba(124,89,74,.3);
  --pu:#b87aa8;--pub:rgba(124,74,110,.12);--pul:rgba(124,74,110,.3);
  --tn:#9a9878;--tnb:rgba(100,100,80,.1);--tnl:rgba(100,100,80,.25);
  --sf:'Uncial Antiqua',Georgia,serif;--bd:'Crimson Pro',Georgia,serif;
  --r:6px;--sab:env(safe-area-inset-bottom,0px)
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--tx);font-family:var(--bd);min-height:100vh;overflow-x:hidden}
button{cursor:pointer;font-family:var(--bd)}
.app{min-height:100vh;display:flex;flex-direction:column;padding-bottom:calc(62px + var(--sab))}
.hdr{padding:1.05rem 1rem .78rem;text-align:center;border-bottom:1px solid var(--b2)}
.ttl{font-family:var(--sf);font-size:1.45rem;color:var(--gold);letter-spacing:.04em}
.sub{font-size:.7rem;color:var(--t3);font-style:italic;letter-spacing:.1em;margin-top:.08rem}
.page{display:none;padding:1rem;flex:1;animation:fi .18s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--b2);display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:var(--sab);z-index:100}
.nvb{background:transparent;border:none;padding:.6rem .3rem .4rem;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--t3);font-size:.58rem;letter-spacing:.05em;text-transform:uppercase;transition:color .15s}
.nvb.active{color:var(--gold)}
.ni{font-size:1.08rem;line-height:1}
.sl{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--t4);margin:.78rem 0 .34rem}
/* speak button */
.spk{background:transparent;border:1px solid var(--b2);color:var(--t3);border-radius:50%;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;font-size:.76rem;transition:all .13s;vertical-align:middle;flex-shrink:0;line-height:1}
.spk:active,.spk.lit{border-color:var(--gold);color:var(--gold)}
.spk.off{opacity:.2;pointer-events:none}
/* plan */
.leg{display:flex;flex-wrap:wrap;gap:.34rem;margin-bottom:.78rem}
.li{display:flex;align-items:center;gap:.25rem;font-size:.67rem;color:var(--t2)}
.ld{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dc{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);margin-bottom:.4rem;overflow:hidden}
.dh{display:grid;grid-template-columns:52px 1fr auto;align-items:center;padding:.65rem .8rem;gap:.5rem;user-select:none}
.dn{font-family:var(--sf);color:var(--gold);font-size:.86rem}
.dl{font-size:.82rem;color:var(--t2)}
.dm{font-size:.66rem;color:var(--t3)}
.db{padding:.08rem .8rem .68rem;display:flex;flex-direction:column;gap:.28rem;border-top:1px solid var(--b2)}
.brow{display:flex;align-items:flex-start;gap:.46rem;padding:.15rem 0}
.bpil{font-size:.62rem;font-weight:600;padding:.18rem .38rem;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:.1rem}
.btx{font-size:.8rem;color:var(--t2);line-height:1.4}
.pno{margin-top:.24rem;font-size:.71rem;color:#7a6858;background:var(--orb);border-left:2px solid var(--orl);padding:.34rem .54rem;line-height:1.5;border-radius:0 3px 3px 0}
.pno strong{color:var(--or);font-weight:600}
.ws{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-top:.7rem}
.wb{background:var(--g3);border:1px solid var(--b2);border-radius:var(--r);padding:.5rem .4rem;text-align:center}
.wn{font-family:var(--sf);font-size:1.2rem;color:var(--gold)}
.wl{font-size:.62rem;color:var(--t3);margin-top:2px}
/* flashcards */
.dg{display:flex;flex-wrap:wrap;gap:.25rem}
.dbt{background:transparent;border:1px solid var(--b2);color:var(--t3);padding:.27rem .6rem;border-radius:3px;font-family:var(--bd);font-size:.77rem;transition:all .13s}
.dbt.on{background:var(--g3);border-color:var(--gold);color:var(--gold)}
.dvd{height:1px;background:var(--b2);margin:.84rem 0}
.std{display:flex;flex-direction:column;align-items:center}
.csc{width:100%;perspective:1000px;margin-bottom:.92rem;min-height:182px}
.cwp{position:relative;width:100%;min-height:182px;transform-style:preserve-3d;transition:transform .42s cubic-bezier(.4,0,.2,1)}
.cwp.fl{transform:rotateY(180deg)}
.cfc{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem 1.25rem 1.9rem;text-align:center;min-height:182px}
.cff{background:linear-gradient(150deg,#1a1814,#121110);border:1px solid var(--b1)}
.cfb{background:linear-gradient(150deg,#141a12,#101210);border:1px solid rgba(200,185,122,.22);transform:rotateY(180deg)}
.cch{font-size:.57rem;letter-spacing:.16em;text-transform:uppercase;color:var(--t4);margin-bottom:.68rem}
.cir{font-family:var(--sf);font-size:clamp(1.1rem,5.5vw,1.6rem);color:var(--gold);line-height:1.3;margin-bottom:.15rem}
.cen{font-size:clamp(.88rem,4vw,1.22rem);color:var(--tx);font-weight:300;line-height:1.3}
.cno{margin-top:.52rem;font-size:.71rem;color:var(--t3);font-style:italic;line-height:1.4}
.chi{position:absolute;bottom:.62rem;font-size:.58rem;color:var(--t4);letter-spacing:.09em}
.csp{position:absolute;bottom:.55rem;right:.72rem}

<script>
// ── Speech — Abair.ie Ulster voice, inline with new-tab fallback ─────────────
const ABAIR_API = 'https://abair.ie/api2/synthesise';

async function abair(txt) {
  try {
    const res = await fetch(`${ABAIR_API}?input=${encodeURIComponent(txt)}&voice=ga_UL&audioEncoding=MP3`, {
      method: 'GET',
      headers: { 'Accept': 'application/json' }
    });
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    if (!data.audioContent) throw new Error('No audio');
    // Decode base64 to blob and play
    const bytes = atob(data.audioContent);
    const buf = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) buf[i] = bytes.charCodeAt(i);
    const blob = new Blob([buf], {type: 'audio/mp3'});
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => URL.revokeObjectURL(url);
    audio.play();
  } catch(e) {
    // CORS or API unavailable — open in new tab as fallback
    window.open('https://abair.ie/synthesis?text=' + encodeURIComponent(txt) + '&dialect=Ulster', '_blank');
  }
}

function spkBtn(txt) {
  const esc = txt.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return `<button class="spk" onclick="abair('${esc}')" title="Hear Ulster pronunciation">🔊</button>`;
}

      {heading:'The negative particles',body:'Standard Irish uses ní before consonants and vowels to negate verbs. Ulster uses cha before consonants and chan before vowels and fh. Both cause a change to the following verb, but different changes.',rows:[

const PL = [
  {g:'á',p:'aw',d:"Long 'a'",f:"Like 'aw' in 'saw'. Ulster draws it out.",ex:[['lá','day'],['grá','love'],['bád','boat']],u:"Sounds close to British 'aw'. Keep it long."},
  {g:'é',p:'ay',d:"Long 'e'",f:"Like 'ay' in 'say'. Pure — no diphthong.",ex:[['léigh','read'],['é','him'],['céad','hundred']],u:"Not 'ee'. Keep it pure."},

];

  {g:'ao',p:'ee',d:'ao — the Ulster marker',f:"In Ulster: firmly 'ee'. In Connacht/Munster it's 'ay'. The most distinctive Ulster vowel.",ex:[['saol','world'],['aon','one'],['caora','sheep']],u:"'Saol' = 'seel', 'aon' = 'een'."},
  {g:'aoi',p:'ee',d:'aoi cluster',f:"Same as ao in Ulster — 'ee'.",ex:[['aois','age'],['naoi','nine'],['caoi','way']],u:"'Naoi' (nine) = 'nee'."},
  {g:'ia',p:'ee-a',d:'ia diphthong',f:"Starts like 'ee', glides to 'a'. Like 'yah'.",ex:[['bia','food'],['fiar','slanted'],['iall','strap']],u:"Quick glide."},
  {g:'ua',p:'oo-a',d:'ua diphthong',f:"Starts like 'oo', glides to 'a'. Like 'wah'.",ex:[['ua','grandson'],['fuair','got'],['bua','victory']],u:"'Fuair' = roughly 'foo-er'."},
  {g:'ea',p:'a',d:'ea — slenderness marker',f:"Usually just 'a'. The e marks the preceding consonant as slender.",ex:[['fear','man'],['bean','woman'],['leabhar','book']],u:"Don't pronounce the e separately."},
  {g:'ei',p:'e',d:'ei — slenderness marker',f:"Like 'e' in 'bed'. The i marks the following consonant as slender.",ex:[['deir','says'],['feicim','I see']],u:"The i is a consonant marker."},
  {g:'oi',p:'i',d:'oi combination',f:"Like 'i' in 'bit'. Watch for fada (oíche has long í).",ex:[['oíche','night'],['coill','wood']],u:"Fada in 'oíche' changes it to long 'ee'."},
  {g:'ui',p:'i',d:'ui combination',f:"Like 'i' in 'bit'. The u marks the following consonant as broad.",ex:[['fuil','blood'],['muir','sea'],['buí','yellow']],u:"Mainly a consonant quality signal."},
];

  {g:'bh/mh',p:'v / w',d:'Lenited b and m',f:"Both produce 'v', or 'w' between vowels.",ex:[['bhí','was'],['mhór','great'],['amhrán','song']],u:"Ulster tends toward 'v'. 'Bhí' = 'vee'."},
  {g:'ch',p:'loch',d:'Lenited c',f:"Like Scottish 'loch'. No English equivalent.",ex:[['cha','not (Ulster)'],['chuaigh','went'],['oíche','night']],u:"Ulster ch is strong — especially in 'cha'."},
  {g:'th',p:'h',d:'Lenited t',f:"Lenited t = simple 'h'. Very regular.",ex:[['tháinig','came'],['a theach','his house'],['thug','gave']],u:"'Tháinig' = 'HAH-nig'. Always 'h'."},
  {g:'ph',p:'f',d:'Lenited p',f:"Lenited p = 'f'. Completely regular.",ex:[['phós','married'],['phóg','kissed']],u:"Always 'f'. No exceptions."},
  {g:'gh/dh',p:'y / —',d:'Lenited g and d',f:"'y' before slender vowels. Nearly silent before broad.",ex:[['a dhéanamh','to do'],['togha','choice']],u:"Often a soft 'y' glide."},
  {g:'abh/amh',p:'ow / av',d:'abh and amh clusters',f:"Before broad: 'ow'. Before slender: 'av'.",ex:[['gabh','take'],['labhair','speak'],['amhrán','song']],u:"'Amhrán' = 'owrawn'. 'Labhair' = 'lowir'."},
  {g:'adh/igh',p:'ee / y',d:'adh and igh endings',f:"At word endings: 'ee' or a 'y' glide.",ex:[['samhradh','summer'],['léigh','read'],['rinne','did']],u:"'Samhradh' = 'sowroo'."},
  {g:'fh',p:'silent',d:'Lenited f',f:"Completely silent.",ex:[['a fhear','his man'],['chan fhuil','there is not']],u:"'Chan fhuil' — fh is silent."},
];

function renderPlan() {
  const el = document.getElementById('page-plan');
  const tot = WEEK.reduce((a,d)=>a+d.mins,0);
  let h = '<div class="sl">This week</div><div class="leg">';

  WEEK.forEach((d,i)=>{
    const opt=d.optional?` <span style="font-size:.65rem;color:var(--t4)">(optional)</span>`:'';
    h+=`<div class="dc"><div class="dh" onclick="toggleDay(${i})"><div class="dn">${d.day}</div><div class="dl">${d.label}${opt}</div><div class="dm">${d.mins>0?d.mins+' min':''}</div></div><div class="db" id="db-${i}" style="display:none">`;
    d.blocks.forEach(b=>{const tc=TC[b.type]||TC.input;h+=`<div class="brow"><div class="bpil" style="background:${tc.bg};border:1px solid ${tc.border};color:${tc.text}">${b.mins>0?b.mins+'m':'—'}</div><div class="btx">${b.text}</div></div>`;});
    if(d.proNote)h+=`<div class="pno"><strong>Sound focus:</strong> ${d.proNote}</div>`;
    if(d.lesson){
      h+=`<div class="lcard"><div class="lcard-title">📖 ${d.lesson.title}</div>`;
      d.lesson.sections.forEach(sec=>{
        h+=`<div class="lsec"><div class="lsec-head">${sec.heading}</div>`;
        h+=`<div class="lsec-body">${sec.body}</div>`;
        h+='<table class="ltable"><thead><tr>';
        sec.rows[0].forEach(col=>h+=`<th>${col}</th>`);
        h+='</tr></thead><tbody>';
        sec.rows.slice(1).forEach(row=>{
          h+='<tr>';
          row.forEach((cell,ci)=>h+=`<td>${cell}</td>`);
          h+='</tr>';
        });
        h+='</tbody></table></div>';
      });
      h+='</div>';
    }
    h+='</div></div>';
  });
  h+=`<div class="ws"><div class="wb"><div class="wn">${tot}</div><div class="wl">mins total</div></div><div class="wb"><div class="wn">7</div><div class="wl">sound focuses</div></div><div class="wb"><div class="wn">12</div><div class="wl">card decks</div></div></div>`;

function toggleDay(i){const b=document.getElementById('db-'+i);b.style.display=b.style.display==='none'?'flex':'none';}

// ── Flashcards ────────────────────────────────────────────────────────────────
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
let FC={dk:'greetings',cards:[],idx:0,fl:false,kn:0,ms:0,done:false,sc:false,dir:'IF',wrong:[],round:1};
FC.cards=shuffle(DECKS.greetings.cards);

function renderFlash(){
  const el=document.getElementById('page-flash');
  let h='';
  GROUPS.forEach(g=>{
    const gd=Object.entries(DECKS).filter(([,d])=>d.group===g);
    if(!gd.length)return;
    h+=`<div class="sl">${g}</div><div class="dg">`;
    gd.forEach(([k,d])=>h+=`<button class="dbt${FC.dk===k?' on':''}" onclick="selDeck('${k}')">${d.emoji} ${d.label}</button>`);
    h+='</div>';
  });
  h+='<div class="dvd"></div><div class="std">';
  if(FC.done){
    const pct=Math.round((FC.kn/FC.cards.length)*100);
    h+=`<div class="dns"><div class="dnt">Maith thú!</div><div class="dss"><span style="color:var(--gn)">${FC.kn}</span> correct · <span style="color:var(--rd)">${FC.ms}</span> missed<br>${FC.round>1?`<span style="color:var(--or);font-size:.78rem">${FC.round} rounds to clear the deck</span><br>`:''}<span style="font-size:.76rem;color:var(--t4)">${pct}% · ${FC.cards.length} cards</span></div><button class="rst" onclick="redoDeck()">Study Again</button></div>`;
  } else {
    const card=FC.cards[FC.idx],deck=DECKS[FC.dk],tot=FC.cards.length,ei=FC.dir==='EI';
    const ft=ei?card.b:card.f,fc=ei?'English':'Gaeilge · Uladh',fcs=ei?'cen':'cir';
    const bt=ei?card.f:card.b,bc=ei?'Gaeilge · Uladh':'English',bcs=ei?'cir':'cen';
    h+=`<div class="dbar"><h2>${deck.emoji} ${deck.label}</h2><div class="dct">
      <button class="drb${!ei?' on':''}" onclick="setDir('IF')">🇮🇪→🇬🇧</button>
      <button class="drb${ei?' on':''}" onclick="setDir('EI')">🇬🇧→🇮🇪</button>
      <button class="shu" onclick="redoDeck()">⟳</button>
    </div></div>`;
    h+=`<div class="prb"><div class="prf" style="width:${(FC.idx/tot)*100}%"></div></div>`;
    h+=`<div class="csc swa" id="csc"><div class="cwp${FC.fl?' fl':''}" onclick="flipCard()">
      <div class="cfc cff"><div class="cch">${fc}</div><div class="${fcs}">${ft}</div><div class="chi">tap to reveal</div></div>
      <div class="cfc cfb"><div class="cch">${bc}</div><div class="${bcs}">${bt}</div>${card.n?`<div class="cno">${card.n}</div>`:''}<div class="chi">tap to flip back</div><div class="csp">${spkBtn(card.f)}</div></div>
    </div></div>`;
    h+='<div class="scr">';
    if(FC.fl)h+=`<button class="scb k" onclick="scoreCard(true)" ${FC.sc?'disabled':''}>✓ Knew it</button><button class="scb m" onclick="scoreCard(false)" ${FC.sc?'disabled':''}>✗ Missed it</button>`;
    else h+='<span class="fhi">tap card to reveal</span>';
    h+='</div>';
    h+=`<div class="cnv"><button class="nbt" onclick="cNav(-1)" ${FC.idx===0?'disabled':''}>←</button><div class="cct">${FC.idx+1} / ${tot}</div><button class="nbt" onclick="cNav(1)">→</button></div>`;
    const roundLabel=FC.round>1?` · Round ${FC.round} (retry)`:'';
    h+=`<div class="cst"><span style="color:var(--gn)">✓ ${FC.kn}</span> · <span style="color:var(--rd)">✗ ${FC.ms}</span> · ${tot-FC.idx-1} remaining${roundLabel}</div>`;
  }
  h+='</div>';
  el.innerHTML=h;setupSwipe();
}
function setDir(d){FC.dir=d;FC.fl=false;FC.sc=false;renderFlash();}
function selDeck(k){FC={dk:k,cards:shuffle(DECKS[k].cards),idx:0,fl:false,kn:0,ms:0,done:false,sc:false,dir:FC.dir,wrong:[],round:1};renderFlash();}
function flipCard(){FC.fl=!FC.fl;renderFlash();}
function scoreCard(ok){
  if(FC.sc)return;
  FC.sc=true;
  if(ok){FC.kn++;}
  else{FC.ms++;if(!FC.wrong.find(c=>c.f===FC.cards[FC.idx].f))FC.wrong.push(FC.cards[FC.idx]);}
  renderFlash();
}
function cNav(d){
  if(d>0){
    if(FC.idx+1>=FC.cards.length){
      if(FC.wrong.length>0){
        FC.round++;
        FC.cards=shuffle([...FC.wrong]);
        FC.wrong=[];
        FC.idx=0;FC.fl=false;FC.sc=false;
      } else {
        FC.done=true;
      }
    } else {FC.idx++;FC.fl=false;FC.sc=false;}
  } else if(FC.idx>0){FC.idx--;FC.fl=false;FC.sc=false;}
  renderFlash();
}
function redoDeck(){FC.cards=shuffle(DECKS[FC.dk].cards);FC.idx=0;FC.fl=false;FC.kn=0;FC.ms=0;FC.done=false;FC.sc=false;FC.wrong=[];FC.round=1;renderFlash();}
function setupSwipe(){const e=document.getElementById('csc');if(!e)return;let sx=0;e.addEventListener('touchstart',ev=>{sx=ev.touches[0].clientX;},{passive:true});e.addEventListener('touchend',ev=>{const dx=ev.changedTouches[0].clientX-sx;if(Math.abs(dx)>50)cNav(dx<0?1:-1);},{passive:true});}

let BLD={pi:0,sel:{},mode:'build',qsel:{},qch:false,qsc:{c:0,t:0},qval:''};

function renderBuilder(){
  const el=document.getElementById('page-build');
  const pat=PATTERNS[BLD.pi],sks=Object.keys(pat.slots);
  let h=`<div class="mro"><button class="mta${BLD.mode==='build'?' on':''}" onclick="setBMode('build')">Build</button><button class="mta${BLD.mode==='quiz'?' on':''}" onclick="setBMode('quiz')">Quiz</button></div>`;

  if(BLD.mode==='build'){
    h+=`<p class="bin">Pick words from each slot to build a real Irish sentence.</p>`;
    h+=`<div class="pcr"><div class="pla">Pattern ${BLD.pi+1} of ${PATTERNS.length}</div><div class="pte">${pat.p}</div><div class="pex">${pat.ex}</div><div class="ptr">"${pat.tr}"</div><div class="pti">💡 ${pat.tip}</div><div class="slo">`;
    sks.forEach(slot=>{
      h+=`<div class="sro"><div class="sla">${slot}</div><div class="sop">`;
      pat.slots[slot].forEach(opt=>{const esc=opt.replace(/'/g,"\\'");h+=`<button class="sobt${BLD.sel[slot]===opt?' on':''}" onclick="selSlot('${slot}','${esc}','build')">${opt}</button>`;});
      h+='</div></div>';
    });
    h+='</div>';
    const as=sks.every(k=>BLD.sel[k]);
    if(as){let ir=pat.p,en=pat.enp||pat.p;sks.forEach(k=>{const iw=BLD.sel[k].split(' (')[0],ew=(BLD.sel[k].match(/\(([^)]+)\)/)||[])[1]||BLD.sel[k];ir=ir.replace(`[${k}]`,iw);en=en.replace(`[${k}]`,ew);});en=en.charAt(0).toUpperCase()+en.slice(1);h+=`<div class="bsn"><div class="bsi">${ir} ${spkBtn(ir)}</div><div class="bse">${en}</div></div>`;}
    else{const ms=sks.filter(k=>!BLD.sel[k]).join(' and ');h+=`<div style="margin-top:.75rem;font-size:.7rem;color:var(--t4);text-align:center">select ${ms}</div>`;}
    h+='</div>';
  } else {
    // Quiz mode — stays on selected pattern, generates new combos each time
    let targetIr = pat.p, targetEn = pat.enp || pat.p;
    sks.forEach(k => {
      if(BLD.sel[k]){
        const iw=BLD.sel[k].split(' (')[0];
        const ew=(BLD.sel[k].match(/\(([^)]+)\)/)||[])[1]||BLD.sel[k];
        targetIr=targetIr.replace('['+k+']',iw);
        targetEn=targetEn.replace('['+k+']',ew);
      }
    });
    // Capitalise first letter of English
    targetEn = targetEn.charAt(0).toUpperCase() + targetEn.slice(1);

    // Pattern selector row
    h+=`<div class="bnv" style="margin-bottom:.9rem">
      <button class="nnbt" onclick="buildNav(-1)" ${BLD.pi===0?'disabled':''}>← Pattern</button>
      <span class="pct">Pattern ${BLD.pi+1} / ${PATTERNS.length}</span>
      <button class="nnbt" onclick="buildNav(1)" ${BLD.pi===PATTERNS.length-1?'disabled':''}>Pattern →</button>
    </div>`;

    h+=`<div class="qst">
      <span style="color:var(--t3);font-size:.72rem;letter-spacing:.06em">${pat.p}</span>
      <span><span style="color:var(--gn)">✓ ${BLD.qsc.c}</span> <span style="color:var(--t4)">/ ${BLD.qsc.t}</span></span>
    </div>`;

    // Build readable slot display instead of nonsensical English sentence
    let slotDisplay = sks.map(k => {
      const en = (BLD.sel[k].match(/\(([^)]+)\)/) || [])[1] || BLD.sel[k].split(' (')[0];
      return `<span style="background:var(--g3);border:1px solid var(--b2);border-radius:3px;padding:.15rem .5rem;font-size:.9rem;color:var(--tx);margin:.1rem">${en}</span>`;
    }).join('<span style="color:var(--t3);margin:0 .2rem">+</span>');

    h+=`<div class="qpr">
      <div class="wphint">Build this sentence in Irish</div>
      <div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:.2rem;margin:.5rem 0">${slotDisplay}</div>
      <div class="qsu" style="margin-top:.4rem;font-size:.72rem">Pattern: <em>${pat.p}</em></div>
      <div class="qsu" style="margin-top:.2rem">💡 ${pat.tip}</div>
    </div>`;

    const qcls=BLD.qch?(checkAnswer(BLD.qval||'',targetIr)!=='wrong'?' cor':' wrg'):'';
    h+=`<textarea class="winput${qcls}" id="qinput" rows="2" placeholder="Type the Irish…"
      oninput="BLD.qval=this.value"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();checkQTyped();}"
      ${BLD.qch?'readonly':''}>${BLD.qval||''}</textarea>`;

    if(!BLD.qch){
      h+=`<button class="qck" onclick="checkQTyped()">Check</button>`;
    } else {
      const qr=checkAnswer(BLD.qval||'',targetIr);
      const qcl=qr!=='wrong'?'cor':'wrg';
      const qm=qr==='exact'?'Correct! 🎉':qr==='near'?'Almost — watch the fadas':'Not quite';
      h+=`<div class="qre ${qcl}"><div class="qir">${targetIr} ${spkBtn(targetIr)}</div>`;
      if(qr==='wrong'&&(BLD.qval||'').trim()){
        h+=`<div style="font-size:.74rem;margin-bottom:.28rem;color:var(--t3)">Correct: <span style="font-family:var(--sf)">${diffHtml(BLD.qval,targetIr)}</span></div>`;
      }
      h+=`${qm}</div>`;
      h+=`<button class="wnxt" onclick="nextBuildQ()">New question →</button>`;
    }
    h+='</div>';
  }
  h+=`<div class="bnv"><button class="nnbt" onclick="bNav(-1)" ${BLD.pi===0?'disabled':''}>← Previous</button><span class="pct">${BLD.pi+1} / ${PATTERNS.length}</span><button class="nnbt" onclick="bNav(1)" ${BLD.pi===PATTERNS.length-1?'disabled':''}>Next →</button></div>`;
  el.innerHTML=h;
}
function setBMode(m){BLD.mode=m;BLD.sel={};BLD.qsel={};BLD.qch=false;BLD.qval='';if(m==='quiz')pickAnswers();renderBuilder();}
function pickAnswers(){const pat=PATTERNS[BLD.pi];Object.keys(pat.slots).forEach(k=>{const o=pat.slots[k];BLD.sel[k]=o[Math.floor(Math.random()*o.length)];});}
function selSlot(s,v,m){if(m==='build')BLD.sel[s]=v;else BLD.qsel[s]=v;renderBuilder();}
function checkQ(){const sks=Object.keys(PATTERNS[BLD.pi].slots);BLD.qch=true;BLD.qsc.t++;if(sks.every(k=>BLD.qsel[k]===BLD.sel[k]))BLD.qsc.c++;renderBuilder();}
function checkQTyped(){
  const inp=document.getElementById('qinput');
  if(inp)BLD.qval=inp.value;
  if(!(BLD.qval||'').trim())return;
  const pat=PATTERNS[BLD.pi];const sks=Object.keys(pat.slots);
  let tgt=pat.p; // target Irish sentence
  sks.forEach(k=>{if(BLD.sel[k])tgt=tgt.replace('['+k+']',BLD.sel[k].split(' (')[0]);});
  BLD.qch=true;BLD.qsc.t++;
  if(checkAnswer(BLD.qval,tgt)!=='wrong')BLD.qsc.c++;
  renderBuilder();
}
function nextBuildQ(){
  // Stay on same pattern, generate new slot combination
  BLD.sel={}; BLD.qsel={}; BLD.qch=false; BLD.qval='';
  pickAnswers();
  renderBuilder();
  setTimeout(()=>{ const el=document.getElementById('qinput'); if(el)el.focus(); },50);
}
function bNav(d){BLD.pi=Math.max(0,Math.min(PATTERNS.length-1,BLD.pi+d));BLD.sel={};BLD.qsel={};BLD.qch=false;if(BLD.mode==='quiz')pickAnswers();renderBuilder();}

// ── Pronunciation ─────────────────────────────────────────────────────────────
let PRN={tab:'vowels',vt:'long',active:null};

function renderPron(){
  const el=document.getElementById('page-pron');
  let h=`<div class="ptr2"><button class="ptbt${PRN.tab==='vowels'?' on':''}" onclick="setPT('vowels')">Vowels</button><button class="ptbt${PRN.tab==='bs'?' on':''}" onclick="setPT('bs')">Broad vs Slender</button></div>`;

  if(PRN.tab==='vowels'){
    h+=`<div class="rub">Tap any combination for pronunciation, examples, and Ulster notes. Use 🔊 to hear the sound.</div>`;
    h+=`<div class="ptr2"><button class="ptbt${PRN.vt==='long'?' on':''}" onclick="setPVT('long')">Long vowels</button><button class="ptbt${PRN.vt==='diph'?' on':''}" onclick="setPVT('diph')">Diphthongs</button><button class="ptbt${PRN.vt==='clust'?' on':''}" onclick="setPVT('clust')">Clusters</button></div>`;
    h+='<div class="pgr">';
    PDATA[PRN.vt].forEach((it,i)=>h+=`<div class="pcd${PRN.active&&PRN.active.g===it.g?' on':''}" onclick="selPC(${i})"><div class="pcg">${it.g}</div><div class="pcp">/${it.p}/</div></div>`);
    h+='</div>';
    if(PRN.active){
      const a=PRN.active,exIr=a.ex.map(e=>e[0]).join(', ');
      h+=`<div class="pdt"><div class="pdh"><div class="pdt2">${a.g} — ${a.d}</div>${spkBtn(exIr)}</div><div class="pdp">/${a.p}/</div><div class="pdf">${a.f}</div><div class="pdx">${a.ex.map(([w,m])=>`<div class="pde">${w} ${spkBtn(w)} <span>— ${m}</span></div>`).join('')}</div>${a.u?`<div class="pdu">Ulster: ${a.u}</div>`:''}</div>`;
    }
  }

  if(PRN.tab==='bs'){
    h+=`<div class="rub"><strong>The rule:</strong> caol le caol agus leathan le leathan — slender with slender, broad with broad. Many "extra" vowels are consonant quality markers, not full syllables.</div>`;
    const bC=[['l',"like 'l' in law",'lá, ól'],['n',"like 'n' in now",'nó, ná'],['d','dental d','doras'],['t','dental t','tá'],['s',"like English 's'",'sa'],['g',"hard 'g'",'gorm'],['c',"hard 'k'",'cara'],['b',"English 'b'",'bád'],['m',"English 'm'",'mór']];
    const sC=[['l',"'ly' / palatal",'léigh'],['n',"'ny' like canyon",'ní'],['d',"like 'j' / 'dy'",'deis'],['t',"like 'ch' in cheese",'tír'],['s',"like 'sh'",'sí, seo'],['g',"'g' + y quality",'géar'],['c',"'k' + y quality",'cill'],['b',"'b' + y quality",'bí'],['m',"'m' + y quality",'mí']];
    h+='<div class="bsg"><div class="bsc broad"><div class="bsh">Broad — beside a, o, u</div>';
    bC.forEach(([l,s,e])=>h+=`<div class="cro"><span class="crl">${l}</span><span class="crs">${s}</span><span class="cre">${e}</span></div>`);
    h+='</div><div class="bsc slender"><div class="bsh">Slender — beside e, i</div>';
    sC.forEach(([l,s,e])=>h+=`<div class="cro"><span class="crl">${l}</span><span class="crs">${s}</span><span class="cre">${e}</span></div>`);
    h+='</div></div><div class="sl">Why extra vowels appear</div><div class="bsx">';
    [['fear','man — e marks f as slender. Main vowel is a.'],['bean','woman — e marks b as slender.'],['fuil','blood — ui marks l as slender.'],['saol','world — ao = ee in Ulster. l is broad (o flanks it).'],['tír','country — í forces t to be slender → sounds like ch.']].forEach(([w,e])=>{
      h+=`<div class="bse2"><strong>${w}</strong> ${spkBtn(w)} — ${e}</div>`;
    });
    h+='</div>';
  }
  el.innerHTML=h;
}
function setPT(t){PRN.tab=t;PRN.active=null;renderPron();}
function setPVT(t){PRN.vt=t;PRN.active=null;renderPron();}
function selPC(i){const it=PDATA[PRN.vt][i];PRN.active=PRN.active&&PRN.active.g===it.g?null:it;renderPron();}


// ── Write exercises ───────────────────────────────────────────────────────────
let WR = {mode:'vocab', dk:'greetings', cards:[], idx:0, val:'', checked:false, skipped:false, cor:0, tot:0, done:false, wrong:[], round:1};

// normalise for comparison: lowercase, trim, collapse spaces
// we do NOT strip fadas — getting accents right is part of the exercise
// but we accept close matches (fada-stripped) as near-correct
function norm(s){
  return s.trim().toLowerCase()
    .replace(/\s*\/\s*/g,'/')   // normalise spaces around slashes: sé / sí → sé/sí
    .replace(/\s*-\s*/g,'-')    // normalise spaces around hyphens
    .replace(/[.,!?;:]+$/,'')    // strip trailing punctuation
    .replace(/\s+/g,' ');       // collapse multiple spaces
}
function stripFada(s){ return s.normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function getSyntheticAnalyticAlts(irish) {
  // Returns all valid forms — synthetic and analytic equivalents
  const alts = [irish];
  const words = irish.trim().split(' ');

  // Find the verb position — may be after a negative particle (ní, cha, chan, níor, ar)
  const particles = ['ní', 'cha', 'chan', 'níor', 'ar', 'nach', 'níl'];
  let vIdx = 0;
  if (particles.includes(words[0].toLowerCase())) vIdx = 1;

  const pre  = words.slice(0, vIdx);       // particle(s) before verb if any
  const verb = words[vIdx] || '';           // the verb
  const post = words.slice(vIdx + 1);      // everything after verb

  // Helper: rebuild sentence
  const rebuild = (v, extra) => [...pre, v, ...extra].join(' ');

  // ── Synthetic → Analytic ──────────────────────────────────────────────────

  // 2nd conj -ímid → -íonn muid
  if (verb.endsWith('ímid')) {
    alts.push(rebuild(verb.slice(0,-4)+'íonn', ['muid', ...post]));
  }
  // 2nd conj -ím → -íonn mé (not -ímid)
  else if (verb.endsWith('ím')) {
    alts.push(rebuild(verb.slice(0,-2)+'íonn', ['mé', ...post]));
  }

  // 1st conj broad -aimid → -ann muid
  if (verb.endsWith('aimid')) {
    alts.push(rebuild(verb.slice(0,-5)+'ann', ['muid', ...post]));
  }
  // 1st conj broad -aim → -ann mé (not -aimid)
  else if (verb.endsWith('aim')) {
    alts.push(rebuild(verb.slice(0,-3)+'ann', ['mé', ...post]));
  }

  // 1st conj slender -imid → -eann muid (not -aimid)
  if (verb.endsWith('imid') && !verb.endsWith('aimid')) {
    alts.push(rebuild(verb.slice(0,-4)+'eann', ['muid', ...post]));
  }
  // 1st conj slender -im → -eann mé (not -aim, -ím, -imid)
  else if (verb.endsWith('im') && !verb.endsWith('aim') && !verb.endsWith('ím') && !verb.endsWith('imid')) {
    alts.push(rebuild(verb.slice(0,-2)+'eann', ['mé', ...post]));
  }

  // ── Analytic → Synthetic ──────────────────────────────────────────────────
  // The word after the verb should be mé or muid
  const nextWord = post[0] ? post[0].toLowerCase() : '';
  const afterPronoun = post.slice(1);

  if (nextWord === 'mé') {
    if (verb.endsWith('íonn'))  alts.push(rebuild(verb.slice(0,-4)+'ím',    afterPronoun));
    if (verb.endsWith('eann'))  alts.push(rebuild(verb.slice(0,-4)+'im',    afterPronoun));
    if (verb.endsWith('ann') && !verb.endsWith('eann'))
                                alts.push(rebuild(verb.slice(0,-3)+'aim',   afterPronoun));
  }
  if (nextWord === 'muid') {
    if (verb.endsWith('íonn'))  alts.push(rebuild(verb.slice(0,-4)+'ímid',  afterPronoun));
    if (verb.endsWith('eann'))  alts.push(rebuild(verb.slice(0,-4)+'imid',  afterPronoun));
    if (verb.endsWith('ann') && !verb.endsWith('eann'))
                                alts.push(rebuild(verb.slice(0,-3)+'aimid', afterPronoun));
  }

  return [...new Set(alts)]; // deduplicate
}

function checkAnswer(userRaw, correct) {
  const u = norm(userRaw);
  const alts = getSyntheticAnalyticAlts(correct);
  for (const alt of alts) {
    const c = norm(alt);
    if (u === c) return 'exact';
    if (stripFada(u) === stripFada(c)) return 'near';
  }
  return 'wrong';
}

function diffHtml(user, correct) {
  // character-level diff for feedback
  const u = norm(user), c = norm(correct);
  let h = '';
  const maxLen = Math.max(u.length, c.length);
  for (let i = 0; i < c.length; i++) {
    const uc = u[i] || '';
    const cc = c[i];
    if (uc === cc) h += `<span class="char-ok">${cc}</span>`;
    else h += `<span class="char-bad">${cc}</span>`;
  }
  return h;
}

function buildWriteCards() {
  WR.round = 1; WR.wrong = [];
  if (WR.mode === 'vocab') {
    WR.cards = shuffle([...DECKS[WR.dk].cards]);
  } else {
    // sentence mode: use patterns, generate a specific slot combination as the answer
    WR.cards = PATTERNS.map(pat => {
      const sks = Object.keys(pat.slots);
      const chosen = {};
      sks.forEach(k => { const o=pat.slots[k]; chosen[k]=o[Math.floor(Math.random()*o.length)]; });
      let ir = pat.p, en = pat.enp || pat.p;
      sks.forEach(k => {
        const iw = chosen[k].split(' (')[0];
        const ew = (chosen[k].match(/\(([^)]+)\)/) || [])[1] || chosen[k];
        ir = ir.replace(`[${k}]`, iw);
        en = en.replace(`[${k}]`, ew);
      });
      return { f: ir, b: en, n: pat.tip };
    });
    WR.cards = shuffle(WR.cards);
  }
  WR.idx=0; WR.val=''; WR.checked=false; WR.skipped=false; WR.cor=0; WR.tot=0; WR.done=false;
}

function renderWrite() {
  const el = document.getElementById('page-write');
  let h = '';

  // Mode tabs
  h += `<div class="wmode">
    <button class="wmta${WR.mode==='vocab'?' on':''}" onclick="setWMode('vocab')">Vocab</button>
    <button class="wmta${WR.mode==='sentence'?' on':''}" onclick="setWMode('sentence')">Sentences</button>
  </div>`;

  // Deck selector (vocab mode only)
  if (WR.mode === 'vocab') {
    GROUPS.forEach(g => {
      const gd = Object.entries(DECKS).filter(([,d])=>d.group===g);
      if (!gd.length) return;
      h += `<div class="sl">${g}</div><div class="dgrid" style="display:flex;flex-wrap:wrap;gap:.25rem;margin-bottom:.2rem">`;
      gd.forEach(([k,d]) => h += `<button class="dbt${WR.dk===k?' on':''}" onclick="setWDeck('${k}')">${d.emoji} ${d.label}</button>`);
      h += '</div>';
    });
    h += '<div class="dvd" style="height:1px;background:var(--b2);margin:.84rem 0"></div>';
  }

  if (WR.done) {
    const pct = Math.round((WR.cor / WR.tot) * 100);
    h += `<div class="wdone">
      <div class="wdone-t">Maith thú!</div>
      <div class="wdone-s"><span style="color:var(--gn)">${WR.cor}</span> correct of ${WR.tot}<br>${WR.round>1?`<span style="font-size:.78rem;color:var(--or)">${WR.round} rounds to clear the deck</span><br>`:''}<span style="font-size:.78rem;color:var(--t4)">${pct}% accuracy</span></div>
      <button class="rst" onclick="restartWrite()">Try again</button>
    </div>`;
    el.innerHTML = h;
    return;
  }

  const card = WR.cards[WR.idx];
  const total = WR.cards.length;
  // In vocab mode: show English (card.b), user types Irish (card.f)
  // In sentence mode: show English (card.b), user types Irish (card.f) — same structure
  const prompt = WR.mode === 'vocab' ? card.b : card.b;
  const answer = WR.mode === 'vocab' ? card.f : card.f;

  const roundLabel = WR.round > 1 ? ` · Round ${WR.round} (retry)` : '';
  h += `<div class="wstat"><div>${WR.idx+1} / ${total}${roundLabel}</div><div><span style="color:var(--gn)">✓ ${WR.cor}</span> · ${total-WR.idx-1} left</div></div>`;

  h += `<div class="wprompt">
    <div class="wphint">${WR.mode==='vocab'?'Type the Irish':'Type this sentence in Irish'}</div>
    <div class="wpen">${prompt}</div>
    ${card.lit ? `<div class="wpno" style="color:var(--or);margin-top:.3rem">Lit. "${card.lit}"</div>` : (card.n ? `<div class="wpno">${card.n}</div>` : '')}
  </div>`;

  const inputCls = WR.checked ? (checkAnswer(WR.val, answer) !== 'wrong' ? ' cor' : ' wrg') : '';
  h += `<textarea class="winput${inputCls}" id="winput" rows="2" placeholder="Type in Irish…" ${WR.checked?'readonly':''}
    oninput="WR.val=this.value" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();checkWrite();}">${WR.val}</textarea>`;

  if (!WR.checked && !WR.skipped) {
    h += `<div class="wbtns">
      <button class="wchk" onclick="checkWrite()">Check</button>
      <button class="wskip" onclick="skipWrite()">Skip</button>
    </div>`;
  }

  if (WR.checked || WR.skipped) {
    const result = WR.skipped ? 'sk' : (checkAnswer(WR.val, answer) !== 'wrong' ? 'cor' : 'wrg');
    const msg = WR.skipped ? 'Skipped' : (result==='cor' ? (checkAnswer(WR.val,answer)==='near'?'Almost — watch the fadas':'Correct! 🎉') : 'Not quite');
    h += `<div class="wres ${result}">
      <div class="wans">${answer} ${spkBtn(answer)}</div>`;
    if (result === 'wrg' && WR.val.trim()) {
      h += `<div style="font-size:.76rem;margin-bottom:.3rem;color:var(--t3)">Correct spelling: <span style="font-family:var(--sf)">${diffHtml(WR.val, answer)}</span></div>`;
    }
    h += `${msg}</div>`;
    h += `<button class="wnxt" onclick="nextWrite()">${WR.idx+1 >= total ? 'See results' : 'Next →'}</button>`;
  }

  el.innerHTML = h;
  if (!WR.checked && !WR.skipped) {
    const inp = document.getElementById('winput');
    if (inp) inp.focus();
  }
}

function setWMode(m) {
  WR.mode = m;
  if (m === 'sentence') WR.dk = '';
  buildWriteCards();
  renderWrite();
}
function setWDeck(k) {
  WR.dk = k;
  buildWriteCards();
  renderWrite();
}
function checkWrite() {
  const inp = document.getElementById('winput');
  if (inp) WR.val = inp.value;
  if (!WR.val.trim()) return;
  WR.checked = true;
  WR.tot++;
  const r = checkAnswer(WR.val, WR.cards[WR.idx].f);
  if (r !== 'wrong') WR.cor++;
  renderWrite();
}
function skipWrite() {
  WR.skipped = true;
  WR.tot++;
  renderWrite();
}
function nextWrite() {
  // Track wrong/skipped cards for retry
  const card = WR.cards[WR.idx];
  if (WR.skipped || checkAnswer(WR.val, card.f) === 'wrong') {
    // Only add if not already in wrong list
    if (!WR.wrong.find(c => c.f === card.f)) WR.wrong.push(card);
  }
  if (WR.idx + 1 >= WR.cards.length) {
    if (WR.wrong.length > 0) {
      // Start retry round with wrong cards
      WR.round++;
      WR.cards = shuffle([...WR.wrong]);
      WR.wrong = [];
      WR.idx = 0;
    } else {
      WR.done = true;
    }
  } else {
    WR.idx++;
  }
  WR.val = ''; WR.checked = false; WR.skipped = false;
  renderWrite();
}
function restartWrite() {
  buildWriteCards();
  renderWrite();
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildWriteCards();
renderPlan();renderFlash();renderBuilder();renderPron();renderWrite();
</script>
