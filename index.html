<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<title>Gaeilge Uladh</title>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0e0b;--bg2:#181614;--gold:#c8b97a;--g3:rgba(200,185,122,.08);
  --b1:rgba(200,185,122,.16);--b2:rgba(200,185,122,.08);
  --tx:#e8e0d0;--t2:#9a8e78;--t3:#5a5448;--t4:#3a3428;
  --gn:#7ab87a;--gnb:rgba(74,124,89,.12);--gnl:rgba(74,124,89,.3);
  --rd:#b87a7a;--rdb:rgba(124,74,74,.12);--rdl:rgba(124,74,74,.3);
  --bl:#7a9ab8;--blb:rgba(74,92,124,.12);--bll:rgba(74,92,124,.3);
  --or:#b8967a;--orb:rgba(124,89,74,.12);--orl:rgba(124,89,74,.3);
  --pu:#b87aa8;--pub:rgba(124,74,110,.12);--pul:rgba(124,74,110,.3);
  --tn:#9a9878;--tnb:rgba(100,100,80,.1);--tnl:rgba(100,100,80,.25);
  --sf:'Uncial Antiqua',Georgia,serif;--bd:'Crimson Pro',Georgia,serif;
  --r:6px;--sab:env(safe-area-inset-bottom,0px)
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--tx);font-family:var(--bd);min-height:100vh;overflow-x:hidden}
button{cursor:pointer;font-family:var(--bd)}
.app{min-height:100vh;display:flex;flex-direction:column;padding-bottom:calc(62px + var(--sab))}
.hdr{padding:1.05rem 1rem .78rem;text-align:center;border-bottom:1px solid var(--b2)}
.ttl{font-family:var(--sf);font-size:1.45rem;color:var(--gold);letter-spacing:.04em}
.sub{font-size:.7rem;color:var(--t3);font-style:italic;letter-spacing:.1em;margin-top:.08rem}
.page{display:none;padding:1rem;flex:1;animation:fi .18s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--b2);display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:var(--sab);z-index:100}
.nvb{background:transparent;border:none;padding:.6rem .3rem .4rem;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--t3);font-size:.58rem;letter-spacing:.05em;text-transform:uppercase;transition:color .15s}
.nvb.active{color:var(--gold)}
.ni{font-size:1.08rem;line-height:1}
.sl{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--t4);margin:.78rem 0 .34rem}
/* speak button */
.spk{background:transparent;border:1px solid var(--b2);color:var(--t3);border-radius:50%;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;font-size:.76rem;transition:all .13s;vertical-align:middle;flex-shrink:0;line-height:1}
.spk:active,.spk.lit{border-color:var(--gold);color:var(--gold)}
.spk.off{opacity:.2;pointer-events:none}
/* plan */
.leg{display:flex;flex-wrap:wrap;gap:.34rem;margin-bottom:.78rem}
.li{display:flex;align-items:center;gap:.25rem;font-size:.67rem;color:var(--t2)}
.ld{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dc{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);margin-bottom:.4rem;overflow:hidden}
.dh{display:grid;grid-template-columns:52px 1fr auto;align-items:center;padding:.65rem .8rem;gap:.5rem;user-select:none}
.dn{font-family:var(--sf);color:var(--gold);font-size:.86rem}
.dl{font-size:.82rem;color:var(--t2)}
.dm{font-size:.66rem;color:var(--t3)}
.db{padding:.08rem .8rem .68rem;display:flex;flex-direction:column;gap:.28rem;border-top:1px solid var(--b2)}
.brow{display:flex;align-items:flex-start;gap:.46rem;padding:.15rem 0}
.bpil{font-size:.62rem;font-weight:600;padding:.18rem .38rem;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:.1rem}
.btx{font-size:.8rem;color:var(--t2);line-height:1.4}
.pno{margin-top:.24rem;font-size:.71rem;color:#7a6858;background:var(--orb);border-left:2px solid var(--orl);padding:.34rem .54rem;line-height:1.5;border-radius:0 3px 3px 0}
.pno strong{color:var(--or);font-weight:600}
.ws{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-top:.7rem}
.wb{background:var(--g3);border:1px solid var(--b2);border-radius:var(--r);padding:.5rem .4rem;text-align:center}
.wn{font-family:var(--sf);font-size:1.2rem;color:var(--gold)}
.wl{font-size:.62rem;color:var(--t3);margin-top:2px}
/* flashcards */
.dg{display:flex;flex-wrap:wrap;gap:.25rem}
.dbt{background:transparent;border:1px solid var(--b2);color:var(--t3);padding:.27rem .6rem;border-radius:3px;font-family:var(--bd);font-size:.77rem;transition:all .13s}
.dbt.on{background:var(--g3);border-color:var(--gold);color:var(--gold)}
.dvd{height:1px;background:var(--b2);margin:.84rem 0}
.std{display:flex;flex-direction:column;align-items:center}
.csc{width:100%;perspective:1000px;margin-bottom:.92rem;min-height:182px}
.cwp{position:relative;width:100%;min-height:182px;transform-style:preserve-3d;transition:transform .42s cubic-bezier(.4,0,.2,1)}
.cwp.fl{transform:rotateY(180deg)}
.cfc{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem 1.25rem 1.9rem;text-align:center;min-height:182px}
.cff{background:linear-gradient(150deg,#1a1814,#121110);border:1px solid var(--b1)}
.cfb{background:linear-gradient(150deg,#141a12,#101210);border:1px solid rgba(200,185,122,.22);transform:rotateY(180deg)}
.cch{font-size:.57rem;letter-spacing:.16em;text-transform:uppercase;color:var(--t4);margin-bottom:.68rem}
.cir{font-family:var(--sf);font-size:clamp(1.1rem,5.5vw,1.6rem);color:var(--gold);line-height:1.3;margin-bottom:.15rem}
.cen{font-size:clamp(.88rem,4vw,1.22rem);color:var(--tx);font-weight:300;line-height:1.3}
.cno{margin-top:.52rem;font-size:.71rem;color:var(--t3);font-style:italic;line-height:1.4}
.chi{position:absolute;bottom:.62rem;font-size:.58rem;color:var(--t4);letter-spacing:.09em}
.csp{position:absolute;bottom:.55rem;right:.72rem}
.scr{display:flex;gap:.5rem;margin-bottom:.78rem;justify-content:center;min-height:35px;align-items:center}
.scb{padding:.33rem .92rem;border-radius:3px;font-family:var(--bd);font-size:.84rem;border:1px solid;transition:all .13s}
.scb.k{background:var(--gnb);border-color:var(--gnl);color:var(--gn)}
.scb.m{background:var(--rdb);border-color:var(--rdl);color:var(--rd)}
.scb:disabled{opacity:.2}
.fhi{font-size:.68rem;color:var(--t4);letter-spacing:.06em}
.cnv{display:flex;align-items:center;justify-content:center;gap:.95rem;margin-bottom:.7rem}
.nbt{background:transparent;border:1px solid var(--b2);color:var(--t3);width:38px;height:38px;border-radius:50%;font-size:.88rem;display:flex;align-items:center;justify-content:center;transition:all .13s}
.nbt:active{border-color:var(--gold);color:var(--gold)}
.nbt:disabled{opacity:.11}
.cct{font-size:.78rem;color:var(--t3);min-width:54px;text-align:center}
.cst{font-size:.68rem;color:var(--t4);text-align:center}
.prb{width:100%;height:2px;background:var(--b2);border-radius:1px;margin-bottom:1rem;overflow:hidden}
.prf{height:100%;background:linear-gradient(90deg,#4a7c59,var(--gold));border-radius:1px;transition:width .3s ease}
.dbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.78rem;gap:.42rem;width:100%}
.dbar h2{font-family:var(--sf);font-size:.86rem;color:var(--gold);flex:1}
.dct{display:flex;align-items:center;gap:.34rem}
.shu{background:transparent;border:none;color:var(--t4);font-size:.75rem;padding:.15rem .24rem;transition:color .13s}
.shu:active{color:var(--gold)}
.drb{background:transparent;border:1px solid var(--b2);color:var(--t3);font-size:.68rem;padding:.19rem .46rem;border-radius:3px;transition:all .13s}
.drb.on{background:var(--g3);border-color:var(--gold);color:var(--gold)}
.dns{text-align:center;padding:2.1rem 1rem}
.dnt{font-family:var(--sf);font-size:1.7rem;color:var(--gold);margin-bottom:.5rem}
.dss{font-size:.88rem;color:var(--t2);line-height:2;margin-bottom:1.3rem}
.rst{background:var(--g3);border:1px solid rgba(200,185,122,.28);color:var(--gold);padding:.46rem 1.3rem;border-radius:3px;font-family:var(--bd);font-size:.84rem;letter-spacing:.07em}
/* builder */
.mro{display:flex;border:1px solid var(--b2);border-radius:3px;overflow:hidden;margin-bottom:.9rem}
.mta{flex:1;background:transparent;border:none;border-right:1px solid var(--b2);padding:.38rem .3rem;font-family:var(--bd);font-size:.78rem;color:var(--t3);letter-spacing:.04em;transition:all .13s}
.mta:last-child{border-right:none}
.mta.on{background:var(--g3);color:var(--gold)}
.bin{font-size:.76rem;color:var(--t3);font-style:italic;text-align:center;margin-bottom:1rem;line-height:1.6}
.pcr{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);padding:.9rem;margin-bottom:.68rem}
.pla{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--t4);margin-bottom:.45rem}
.pte{font-family:var(--sf);font-size:.98rem;color:var(--gold);margin-bottom:.28rem;line-height:1.4}
.pex{font-size:.8rem;color:var(--t3);font-style:italic;margin-bottom:.14rem}
.ptr{font-size:.72rem;color:var(--t4);margin-bottom:.65rem}
.pti{font-size:.72rem;color:#4a5048;background:var(--gnb);border-left:2px solid var(--gnl);padding:.34rem .54rem;margin-bottom:.78rem;line-height:1.5;border-radius:0 3px 3px 0}
.slo{display:flex;flex-direction:column;gap:.5rem}
.sro{display:flex;flex-direction:column;gap:.18rem}
.sla{font-size:.58rem;letter-spacing:.13em;text-transform:uppercase;color:var(--t4)}
.sop{display:flex;flex-wrap:wrap;gap:.19rem}
.sobt{background:transparent;border:1px solid var(--b2);color:var(--t3);padding:.21rem .54rem;border-radius:3px;font-family:var(--bd);font-size:.75rem;transition:all .12s}
.sobt.on{background:var(--g3);border-color:var(--gold);color:var(--gold)}
.sobt.cor{background:var(--gnb);border-color:var(--gnl);color:var(--gn)}
.sobt.wrg{background:var(--rdb);border-color:var(--rdl);color:var(--rd)}
.bsn{margin-top:.78rem;padding:.68rem;background:var(--gnb);border:1px solid var(--gnl);border-radius:3px;text-align:center}
.bsi{font-family:var(--sf);font-size:1.05rem;color:var(--gold);margin-bottom:.18rem;display:flex;align-items:center;justify-content:center;gap:.42rem}
.bse{font-size:.78rem;color:#5a7868;font-style:italic}
.bnv{display:flex;justify-content:space-between;align-items:center;margin-top:.68rem}
.nnbt{background:transparent;border:1px solid var(--b2);color:var(--t3);padding:.28rem .75rem;border-radius:3px;font-family:var(--bd);font-size:.76rem;transition:all .13s}
.nnbt:active{border-color:var(--gold);color:var(--gold)}
.nnbt:disabled{opacity:.13}
.pct{font-size:.7rem;color:var(--t4)}
/* quiz */
.qpr{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);padding:.9rem;margin-bottom:.68rem;text-align:center}
.qen{font-size:1rem;color:var(--tx);margin-bottom:.19rem;line-height:1.4}
.qsu{font-size:.72rem;color:var(--t3);font-style:italic}
.qre{margin-top:.78rem;padding:.65rem;border-radius:3px;text-align:center;font-size:.82rem}
.qre.cor{background:var(--gnb);border:1px solid var(--gnl);color:var(--gn)}
.qre.wrg{background:var(--rdb);border:1px solid var(--rdl);color:var(--rd)}
.qir{font-family:var(--sf);font-size:1rem;color:var(--gold);margin-bottom:.16rem}
.qst{display:flex;justify-content:center;gap:1rem;font-size:.76rem;margin-bottom:.52rem}
.qck{background:var(--g3);border:1px solid rgba(200,185,122,.26);color:var(--gold);padding:.36rem 1.05rem;border-radius:3px;font-family:var(--bd);font-size:.82rem;letter-spacing:.05em;margin-top:.68rem;display:block;width:100%;transition:all .13s}
.qck:disabled{opacity:.2}
/* pronunciation */
.ptr2{display:flex;border:1px solid var(--b2);border-radius:3px;overflow:hidden;margin-bottom:.82rem}
.ptbt{flex:1;background:transparent;border:none;border-right:1px solid var(--b2);padding:.38rem .3rem;font-family:var(--bd);font-size:.74rem;color:var(--t3);letter-spacing:.03em;transition:all .13s}
.ptbt:last-child{border-right:none}
.ptbt.on{background:var(--g3);color:var(--gold)}
.rub{background:var(--g3);border:1px solid var(--b2);border-radius:3px;padding:.58rem .7rem;margin-bottom:.78rem;font-size:.76rem;color:var(--t2);line-height:1.6}
.rub strong{color:var(--gold);font-weight:600}
.pgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:4px;margin-bottom:.65rem}
.pcd{background:var(--bg2);border:1px solid var(--b2);border-radius:3px;padding:.55rem .6rem;text-align:center;transition:all .12s;user-select:none}
.pcd.on{border-color:var(--gold);background:var(--g3)}
.pcg{font-family:var(--sf);font-size:1.25rem;color:var(--gold);margin-bottom:1px}
.pcp{font-size:.63rem;color:var(--t3)}
.pdt{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);padding:.74rem .88rem;margin-bottom:.68rem}
.pdh{display:flex;align-items:center;justify-content:space-between;margin-bottom:.18rem}
.pdt2{font-size:.85rem;font-weight:600;color:var(--gold)}
.pdp{font-size:.69rem;color:var(--t3);font-style:italic;margin-bottom:.38rem}
.pdf{font-size:.76rem;color:var(--t2);line-height:1.5;margin-bottom:.48rem}
.pdx{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:.38rem}
.pde{background:var(--g3);border:1px solid var(--b2);border-radius:2px;padding:.12rem .44rem;font-size:.72rem;color:var(--tx);display:flex;align-items:center;gap:.26rem}
.pde span{color:var(--t3);font-size:.68rem}
.pdu{font-size:.7rem;color:#7a8878;border-left:2px solid var(--gnl);padding-left:.44rem;line-height:1.5}
.bsg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:.78rem}
.bsc{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);padding:.65rem}
.bsh{font-size:.58rem;letter-spacing:.11em;text-transform:uppercase;margin-bottom:.4rem;font-weight:600}
.broad .bsh{color:var(--gn)}.slender .bsh{color:var(--bl)}
.cro{display:flex;align-items:center;gap:4px;padding:.18rem 0;border-bottom:1px solid var(--b2);font-size:.72rem}
.cro:last-child{border-bottom:none}
.crl{font-family:var(--sf);font-size:.88rem;color:var(--gold);min-width:12px}
.crs{color:var(--t3);font-size:.66rem;min-width:64px}
.cre{color:var(--t4);font-size:.64rem}
.bsx{display:flex;flex-direction:column;gap:4px;margin-top:.6rem}
.bse2{background:var(--bg2);border:1px solid var(--b2);border-radius:3px;padding:.38rem .58rem;font-size:.74rem;color:var(--t2);line-height:1.5;display:flex;align-items:center;gap:.3rem}
.bse2 strong{color:var(--gold);font-weight:600}
.swa{touch-action:pan-y}
</style>
</head>
<body>
<div class="app">
  <div class="hdr"><div class="ttl">Gaeilge Uladh</div><div class="sub">Ulster Irish · Study Tool</div></div>
  <div id="page-plan"  class="page active"></div>
  <div id="page-flash" class="page"></div>
  <div id="page-build" class="page"></div>
  <div id="page-pron"  class="page"></div>
  <nav class="nav-bar">
    <button class="nvb active" onclick="showPage('plan',this)"><span class="ni">📅</span>Plan</button>
    <button class="nvb" onclick="showPage('flash',this)"><span class="ni">🃏</span>Cards</button>
    <button class="nvb" onclick="showPage('build',this)"><span class="ni">🔨</span>Build</button>
    <button class="nvb" onclick="showPage('pron',this)"><span class="ni">🔊</span>Sound</button>
  </nav>
</div>
<script>
// ── Speech ───────────────────────────────────────────────────────────────────
const HS = 'speechSynthesis' in window;
function speak(txt, btn) {
  if (!HS) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(txt);
  u.lang = 'ga-IE'; u.rate = 0.82;
  if (btn) { btn.classList.add('lit'); u.onend = u.onerror = () => btn.classList.remove('lit'); }
  speechSynthesis.speak(u);
}
function spkBtn(txt) {
  const esc = txt.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return `<button class="spk${HS?'':' off'}" onclick="speak('${esc}',this)">🔊</button>`;
}

// ── Nav ──────────────────────────────────────────────────────────────────────
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nvb').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
}

// ── Data ─────────────────────────────────────────────────────────────────────
const TC = {
  flash:  {bg:'var(--blb)',border:'var(--bll)',text:'var(--bl)',label:'Cards'},
  pronun: {bg:'var(--orb)',border:'var(--orl)',text:'var(--or)',label:'Sound'},
  build:  {bg:'var(--gnb)',border:'var(--gnl)',text:'var(--gn)',label:'Build'},
  output: {bg:'var(--pub)',border:'var(--pul)',text:'var(--pu)',label:'Output'},
  input:  {bg:'var(--tnb)',border:'var(--tnl)',text:'var(--tn)',label:'Listen'},
};

const WEEK = [
  {day:'Mon',label:'Grounding',mins:40,blocks:[
    {mins:10,type:'flash', text:'Flashcards — Greetings deck, then Ulster Phrases deck'},
    {mins:10,type:'pronun',text:'Pronunciation → Broad vs Slender tab: focus on s, d, t, n, l'},
    {mins:10,type:'build', text:'Sentence Builder — patterns 1 and 2 (tá sentences + "have" structure)'},
    {mins:10,type:'input', text:'Raidió Fáilte — passive listening, no pressure'},
  ],proNote:"Say 'sí' vs 'seo' vs 'sa' aloud. Notice how s changes beside each vowel."},
  {day:'Tue',label:'Verbs',mins:45,blocks:[
    {mins:10,type:'flash', text:'Flashcards — Core Verbs deck, full run'},
    {mins:10,type:'pronun',text:'Pronunciation → Long vowels tab: tap á é í ó ú and use the speak buttons'},
    {mins:15,type:'flash', text:'Flashcards — Present Tense deck. Notice two conjugation classes'},
    {mins:10,type:'output',text:'Write 5 present-tense sentences — what you ate, where you are'},
  ],proNote:"Ulster draws long vowels out noticeably. Each of á é í ó ú should feel distinct."},
  {day:'Wed',label:'Vocabulary',mins:40,blocks:[
    {mins:10,type:'flash', text:'Flashcards — People & Family deck, then Adjectives deck'},
    {mins:10,type:'pronun',text:'Pronunciation → Diphthongs tab: tap ao/aoi, ia, ua'},
    {mins:10,type:'build', text:'Sentence Builder — patterns 3 and 4 (VSO + emotion states)'},
    {mins:10,type:'input', text:'Raidió Fáilte — try to catch one word per minute'},
  ],proNote:"ao = 'ee' in Ulster, not 'ay'. Listen for it in 'saol', 'aon', 'gaol'."},
  {day:'Thu',label:'Light day',mins:25,blocks:[
    {mins:10,type:'flash', text:'Flashcards — reshuffle whichever deck felt weakest'},
    {mins:5, type:'pronun',text:'Pronunciation → Diphthongs tab: tap ea, ei, ai, ui — the spelling markers'},
    {mins:10,type:'output',text:'Describe your day in Irish — three broken sentences counts'},
  ],proNote:"'fear', 'bean', 'fuil' — the e and i mark consonant quality, not extra syllables."},
  {day:'Fri',label:'Past tense',mins:45,blocks:[
    {mins:10,type:'flash', text:'Flashcards — Past Tense deck. Focus on the irregular forms'},
    {mins:10,type:'pronun',text:'Pronunciation → Clusters tab: tap bh/mh, ch, th — use speak buttons'},
    {mins:15,type:'build', text:'Sentence Builder — patterns 5 and 6 (is maith liom + chuaigh mé go)'},
    {mins:10,type:'output',text:'Write 5 sentences about yesterday'},
  ],proNote:"'chuaigh' = guttural ch + 'oo-ig'. 'Bhí' = 'vee'. Both are very common in past tense."},
  {day:'Sat',label:'Output day',mins:55,blocks:[
    {mins:10,type:'flash', text:'Flashcards — Food & Drink deck, then Places deck'},
    {mins:10,type:'pronun',text:'Pronunciation → Clusters tab: tap abh/amh, adh/igh, fh'},
    {mins:15,type:'build', text:'Sentence Builder — pattern 7 (future continuous with beidh mé ag)'},
    {mins:20,type:'output',text:'Write 5–8 sentences about your week — post to r/gaeilge'},
  ],proNote:"'Amhrán' (song) = 'owrawn'. 'Samhradh' (summer) = 'sowroo'."},
  {day:'Sun',label:'Rest',mins:0,optional:true,blocks:[
    {mins:0,type:'input',text:'Optional: light flashcard run or Raidió Fáilte in the background'},
  ],proNote:null},

// ── Plan ──────────────────────────────────────────────────────────────────────
function renderPlan() {
  const el = document.getElementById('page-plan');
  const tot = WEEK.reduce((a,d)=>a+d.mins,0);
  let h = '<div class="sl">This week</div><div class="leg">';
  Object.entries(TC).forEach(([k,v])=>h+=`<div class="li"><div class="ld" style="background:${v.text}"></div>${v.label}</div>`);
  h+='</div>';
  WEEK.forEach((d,i)=>{
    const opt=d.optional?` <span style="font-size:.65rem;color:var(--t4)">(optional)</span>`:'';
    h+=`<div class="dc"><div class="dh" onclick="toggleDay(${i})"><div class="dn">${d.day}</div><div class="dl">${d.label}${opt}</div><div class="dm">${d.mins>0?d.mins+' min':''}</div></div><div class="db" id="db-${i}" style="display:none">`;
    d.blocks.forEach(b=>{const tc=TC[b.type]||TC.input;h+=`<div class="brow"><div class="bpil" style="background:${tc.bg};border:1px solid ${tc.border};color:${tc.text}">${b.mins>0?b.mins+'m':'—'}</div><div class="btx">${b.text}</div></div>`;});
    if(d.proNote)h+=`<div class="pno"><strong>Sound focus:</strong> ${d.proNote}</div>`;
    h+='</div></div>';
  });
  h+=`<div class="ws"><div class="wb"><div class="wn">${tot}</div><div class="wl">mins total</div></div><div class="wb"><div class="wn">7</div><div class="wl">sound focuses</div></div><div class="wb"><div class="wn">12</div><div class="wl">card decks</div></div></div>`;
  el.innerHTML=h;
}
function toggleDay(i){const b=document.getElementById('db-'+i);b.style.display=b.style.display==='none'?'flex':'none';}

    </div></div>`;
    h+=`<div class="prb"><div class="prf" style="width:${(FC.idx/tot)*100}%"></div></div>`;
    h+=`<div class="csc swa" id="csc"><div class="cwp${FC.fl?' fl':''}" onclick="flipCard()">
      <div class="cfc cff"><div class="cch">${fc}</div><div class="${fcs}">${ft}</div><div class="chi">tap to reveal</div></div>
      <div class="cfc cfb"><div class="cch">${bc}</div><div class="${bcs}">${bt}</div>${card.n?`<div class="cno">${card.n}</div>`:''}<div class="chi">tap to flip back</div><div class="csp">${spkBtn(card.f)}</div></div>
    </div></div>`;
    h+='<div class="scr">';
    if(FC.fl)h+=`<button class="scb k" onclick="scoreCard(true)" ${FC.sc?'disabled':''}>✓ Knew it</button><button class="scb m" onclick="scoreCard(false)" ${FC.sc?'disabled':''}>✗ Missed it</button>`;
    else h+='<span class="fhi">tap card to reveal</span>';
    h+='</div>';
    h+=`<div class="cnv"><button class="nbt" onclick="cNav(-1)" ${FC.idx===0?'disabled':''}>←</button><div class="cct">${FC.idx+1} / ${tot}</div><button class="nbt" onclick="cNav(1)">→</button></div>`;
    h+=`<div class="cst"><span style="color:var(--gn)">✓ ${FC.kn}</span> · <span style="color:var(--rd)">✗ ${FC.ms}</span> · ${tot-FC.idx-1} remaining</div>`;
  }
  h+='</div>';
  el.innerHTML=h;setupSwipe();
}
function setDir(d){FC.dir=d;FC.fl=false;FC.sc=false;renderFlash();}
function selDeck(k){FC={dk:k,cards:shuffle(DECKS[k].cards),idx:0,fl:false,kn:0,ms:0,done:false,sc:false,dir:FC.dir};renderFlash();}
function flipCard(){FC.fl=!FC.fl;renderFlash();}
function scoreCard(ok){if(FC.sc)return;FC.sc=true;if(ok)FC.kn++;else FC.ms++;renderFlash();}
function cNav(d){if(d>0){if(FC.idx+1>=FC.cards.length)FC.done=true;else{FC.idx++;FC.fl=false;FC.sc=false;}}else if(FC.idx>0){FC.idx--;FC.fl=false;FC.sc=false;}renderFlash();}
function redoDeck(){FC.cards=shuffle(DECKS[FC.dk].cards);FC.idx=0;FC.fl=false;FC.kn=0;FC.ms=0;FC.done=false;FC.sc=false;renderFlash();}
function setupSwipe(){const e=document.getElementById('csc');if(!e)return;let sx=0;e.addEventListener('touchstart',ev=>{sx=ev.touches[0].clientX;},{passive:true});e.addEventListener('touchend',ev=>{const dx=ev.changedTouches[0].clientX-sx;if(Math.abs(dx)>50)cNav(dx<0?1:-1);},{passive:true});}

// ── Builder / Quiz ────────────────────────────────────────────────────────────
let BLD={pi:0,sel:{},mode:'build',qsel:{},qch:false,qsc:{c:0,t:0}};

function renderBuilder(){
  const el=document.getElementById('page-build');
  const pat=PATTERNS[BLD.pi],sks=Object.keys(pat.slots);
  let h=`<div class="mro"><button class="mta${BLD.mode==='build'?' on':''}" onclick="setBMode('build')">Build</button><button class="mta${BLD.mode==='quiz'?' on':''}" onclick="setBMode('quiz')">Quiz</button></div>`;

  if(BLD.mode==='build'){
    h+=`<p class="bin">Pick words from each slot to build a real Irish sentence.</p>`;
    h+=`<div class="pcr"><div class="pla">Pattern ${BLD.pi+1} of ${PATTERNS.length}</div><div class="pte">${pat.p}</div><div class="pex">${pat.ex}</div><div class="ptr">"${pat.tr}"</div><div class="pti">💡 ${pat.tip}</div><div class="slo">`;
    sks.forEach(slot=>{
      h+=`<div class="sro"><div class="sla">${slot}</div><div class="sop">`;
      pat.slots[slot].forEach(opt=>{const esc=opt.replace(/'/g,"\\'");h+=`<button class="sobt${BLD.sel[slot]===opt?' on':''}" onclick="selSlot('${slot}','${esc}','build')">${opt}</button>`;});
      h+='</div></div>';
    });
    h+='</div>';
    const as=sks.every(k=>BLD.sel[k]);
    if(as){let ir=pat.p,en=pat.p;sks.forEach(k=>{const iw=BLD.sel[k].split(' (')[0],ew=(BLD.sel[k].match(/\(([^)]+)\)/)||[])[1]||BLD.sel[k];ir=ir.replace(`[${k}]`,iw);en=en.replace(`[${k}]`,ew);});h+=`<div class="bsn"><div class="bsi">${ir} ${spkBtn(ir)}</div><div class="bse">${en}</div></div>`;}
    else{const ms=sks.filter(k=>!BLD.sel[k]).join(' and ');h+=`<div style="margin-top:.75rem;font-size:.7rem;color:var(--t4);text-align:center">select ${ms}</div>`;}
    h+='</div>';
  } else {
    h+=`<div class="qst"><span style="color:var(--gn)">✓ ${BLD.qsc.c}</span><span style="color:var(--t4)">of ${BLD.qsc.t} answered</span></div>`;
    h+=`<div class="qpr"><div class="qen">"${pat.tr}"</div><div class="qsu">Pattern: ${pat.p}</div></div>`;
    h+=`<div class="pcr"><div class="pti">💡 ${pat.tip}</div><div class="slo">`;
    sks.forEach(slot=>{
      h+=`<div class="sro"><div class="sla">${slot}</div><div class="sop">`;
      pat.slots[slot].forEach(opt=>{
        let cls='sobt';
        if(BLD.qch){if(BLD.qsel[slot]===opt&&opt===BLD.sel[slot])cls+=' cor';else if(BLD.qsel[slot]===opt&&opt!==BLD.sel[slot])cls+=' wrg';else if(opt===BLD.sel[slot])cls+=' cor';}
        else if(BLD.qsel[slot]===opt)cls+=' on';
        const esc=opt.replace(/'/g,"\\'");
        h+=`<button class="${cls}" onclick="selSlot('${slot}','${esc}','quiz')" ${BLD.qch?'disabled':''}>${opt}</button>`;
      });
      h+='</div></div>';
    });
    h+='</div>';
    if(BLD.qch){const ac=sks.every(k=>BLD.qsel[k]===BLD.sel[k]);let ir=pat.p;sks.forEach(k=>{ir=ir.replace(`[${k}]`,(BLD.sel[k]||'?').split(' (')[0]);});h+=`<div class="qre ${ac?'cor':'wrg'}"><div class="qir">${ir} ${spkBtn(ir)}</div>${ac?'Correct! 🎉':'Not quite — correct answer in green'}</div>`;}
    const aqsel=sks.every(k=>BLD.qsel[k]);
    h+=`<button class="qck" onclick="checkQ()" ${(!aqsel||BLD.qch)?'disabled':''}>${BLD.qch?'✓ Checked':'Check answer'}</button>`;
    h+='</div>';
  }

  h+=`<div class="bnv"><button class="nnbt" onclick="bNav(-1)" ${BLD.pi===0?'disabled':''}>← Previous</button><span class="pct">${BLD.pi+1} / ${PATTERNS.length}</span><button class="nnbt" onclick="bNav(1)" ${BLD.pi===PATTERNS.length-1?'disabled':''}>Next →</button></div>`;
  el.innerHTML=h;
}
function setBMode(m){BLD.mode=m;BLD.sel={};BLD.qsel={};BLD.qch=false;if(m==='quiz')pickAnswers();renderBuilder();}
function pickAnswers(){const pat=PATTERNS[BLD.pi];Object.keys(pat.slots).forEach(k=>{const o=pat.slots[k];BLD.sel[k]=o[Math.floor(Math.random()*o.length)];});}
function selSlot(s,v,m){if(m==='build')BLD.sel[s]=v;else BLD.qsel[s]=v;renderBuilder();}
function checkQ(){const sks=Object.keys(PATTERNS[BLD.pi].slots);BLD.qch=true;BLD.qsc.t++;if(sks.every(k=>BLD.qsel[k]===BLD.sel[k]))BLD.qsc.c++;renderBuilder();}
function bNav(d){BLD.pi=Math.max(0,Math.min(PATTERNS.length-1,BLD.pi+d));BLD.sel={};BLD.qsel={};BLD.qch=false;if(BLD.mode==='quiz')pickAnswers();renderBuilder();}

// ── Pronunciation ─────────────────────────────────────────────────────────────
let PRN={tab:'vowels',vt:'long',active:null};

function renderPron(){
  const el=document.getElementById('page-pron');
  let h=`<div class="ptr2"><button class="ptbt${PRN.tab==='vowels'?' on':''}" onclick="setPT('vowels')">Vowels</button><button class="ptbt${PRN.tab==='bs'?' on':''}" onclick="setPT('bs')">Broad vs Slender</button></div>`;

  if(PRN.tab==='vowels'){
    h+=`<div class="rub">Tap any combination for pronunciation, examples, and Ulster notes. Use 🔊 to hear the sound.</div>`;
    h+=`<div class="ptr2"><button class="ptbt${PRN.vt==='long'?' on':''}" onclick="setPVT('long')">Long vowels</button><button class="ptbt${PRN.vt==='diph'?' on':''}" onclick="setPVT('diph')">Diphthongs</button><button class="ptbt${PRN.vt==='clust'?' on':''}" onclick="setPVT('clust')">Clusters</button></div>`;
    h+='<div class="pgr">';
    PDATA[PRN.vt].forEach((it,i)=>h+=`<div class="pcd${PRN.active&&PRN.active.g===it.g?' on':''}" onclick="selPC(${i})"><div class="pcg">${it.g}</div><div class="pcp">/${it.p}/</div></div>`);
    h+='</div>';
    if(PRN.active){
      const a=PRN.active,exIr=a.ex.map(e=>e[0]).join(', ');
      h+=`<div class="pdt"><div class="pdh"><div class="pdt2">${a.g} — ${a.d}</div>${spkBtn(exIr)}</div><div class="pdp">/${a.p}/</div><div class="pdf">${a.f}</div><div class="pdx">${a.ex.map(([w,m])=>`<div class="pde">${w} ${spkBtn(w)} <span>— ${m}</span></div>`).join('')}</div>${a.u?`<div class="pdu">Ulster: ${a.u}</div>`:''}</div>`;
    }
  }

  if(PRN.tab==='bs'){
    h+=`<div class="rub"><strong>The rule:</strong> caol le caol agus leathan le leathan — slender with slender, broad with broad. Many "extra" vowels are consonant quality markers, not full syllables.</div>`;
    const bC=[['l',"like 'l' in law",'lá, ól'],['n',"like 'n' in now",'nó, ná'],['d','dental d','doras'],['t','dental t','tá'],['s',"like English 's'",'sa'],['g',"hard 'g'",'gorm'],['c',"hard 'k'",'cara'],['b',"English 'b'",'bád'],['m',"English 'm'",'mór']];
    const sC=[['l',"'ly' / palatal",'léigh'],['n',"'ny' like canyon",'ní'],['d',"like 'j' / 'dy'",'deis'],['t',"like 'ch' in cheese",'tír'],['s',"like 'sh'",'sí, seo'],['g',"'g' + y quality",'géar'],['c',"'k' + y quality",'cill'],['b',"'b' + y quality",'bí'],['m',"'m' + y quality",'mí']];
    h+='<div class="bsg"><div class="bsc broad"><div class="bsh">Broad — beside a, o, u</div>';
    bC.forEach(([l,s,e])=>h+=`<div class="cro"><span class="crl">${l}</span><span class="crs">${s}</span><span class="cre">${e}</span></div>`);
    h+='</div><div class="bsc slender"><div class="bsh">Slender — beside e, i</div>';
    sC.forEach(([l,s,e])=>h+=`<div class="cro"><span class="crl">${l}</span><span class="crs">${s}</span><span class="cre">${e}</span></div>`);
    h+='</div></div><div class="sl">Why extra vowels appear</div><div class="bsx">';
    [['fear','man — e marks f as slender. Main vowel is a.'],['bean','woman — e marks b as slender.'],['fuil','blood — ui marks l as slender.'],['saol','world — ao = ee in Ulster. l is broad (o flanks it).'],['tír','country — í forces t to be slender → sounds like ch.']].forEach(([w,e])=>{
      h+=`<div class="bse2"><strong>${w}</strong> ${spkBtn(w)} — ${e}</div>`;
    });
    h+='</div>';
  }
  el.innerHTML=h;
}
function setPT(t){PRN.tab=t;PRN.active=null;renderPron();}
function setPVT(t){PRN.vt=t;PRN.active=null;renderPron();}
function selPC(i){const it=PDATA[PRN.vt][i];PRN.active=PRN.active&&PRN.active.g===it.g?null:it;renderPron();}

// ── Init ──────────────────────────────────────────────────────────────────────
renderPlan();renderFlash();renderBuilder();renderPron();
</script>
